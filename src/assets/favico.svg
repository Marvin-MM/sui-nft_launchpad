<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">

  <!-- Solid professional background (deep navy - works great on light/dark tabs) -->
  <!-- You can change the fill color easily -->
  <rect width="210" height="210" rx="60" fill="#0F2A4A"/>

  <defs>
    <linearGradient id="sgGradient" x1="20%" y1="25%" x2="85%" y2="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4EC9FF"/>
      <stop offset="100%" stop-color="#1E7CC8"/>
    </linearGradient>
  </defs>

  <!-- S - slightly lower and to the left (drawn first) -->
  <path 
    d="M78 68 
       C68 55 52 56 45 72 
       C38 88 51 102 68 108 
       C85 114 98 118 98 135 
       C98 152 82 160 65 160 
       C50 160 38 152 32 144" 
    fill="none" 
    stroke="url(#sgGradient)" 
    stroke-width="14" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- G - higher and overlapping S (drawn second → sits ON TOP) -->
  <path 
    d="M155 65 
       C155 48 140 39 122 39 
       C98 39 82 55 82 85 
       C82 115 98 135 122 135 
       C146 135 160 122 165 102 
       L165 92 
       L138 92" 
    fill="none" 
    stroke="url(#sgGradient)" 
    stroke-width="14" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

</svg>